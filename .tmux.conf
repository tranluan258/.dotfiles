set -g default-terminal "xterm-256color"
set -ga terminal-overrides ",-256color:Tc"
# set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'
set -g status-bg default
set -g status-style bg=default
set -g base-index 1
setw -g pane-base-index 1
set-environment -g COLORTERM "truecolor"

set -g prefix C-t
unbind C-b
bind-key C-t send-prefix

unbind %
bind | split-window -h -c "#{pane_current_path}"

unbind '"'
bind - split-window -v -c "#{pane_current_path}"

unbind t
bind c command-prompt -p "Window name:" "new-window -c '#{pane_current_path}' -n '%%'"
set -g automatic-rename off

unbind r
bind r source-file ~/.tmux.conf

set-window-option -g xterm-keys on

#Resize panes
bind -r C-j resize-pane -D 5
bind -r C-k resize-pane -U 5
bind -r C-l resize-pane -R 5
bind -r C-h resize-pane -L 5



#Switch panes in vim
bind -r j select-pane -D
bind -r k select-pane -U
bind -r l select-pane -R
bind -r h select-pane -L

#Switch window / Claude Code session overview
# prefix + s : sessions-only tree, each line prefixed with its Claude status
#   ·=idle  ⚙=working  ✅=done  🔔=needs input
bind s choose-tree -Zs -F "#{?@claude_status,#{@claude_status} ,·  }#{session_name}#{?session_attached, (attached),} — #{session_windows}w"
bind -r w choose-window

#Resize panes in vim
bind -r m resize-pane -Z

#Close current pane
bind -r x kill-pane


set -g mouse on

set-window-option -g mode-keys vi

bind-key -T copy-mode-vi 'v' send -X begin-selection # start selecting text with "v"
bind-key -T copy-mode-vi 'y' send -X copy-selection # copy text with "y"

unbind -T copy-mode-vi MouseDragEnd1Pane # don't exit copy mode when dragging with mouse

# remove delay for exiting insert mode with ESC in Neovim
set -sg escape-time 10

# tpm plugin
set -g @plugin 'tmux-plugins/tpm'

#tmux sessionx
set -g @plugin 'omerxx/tmux-sessionx'
set -g @sessionx-bind 'o'


# list of tmux plugins

# show status bar in top of the screen
set -g status-position bottom

# forget the find window.  That is for chumps
bind-key -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer.sh"


